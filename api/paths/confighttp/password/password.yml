---
post:
  summary: Update credentials.
  description: Update the username and password for the Sunshine Web UI.
  operationId: savePassword
  tags:
    - Authentication
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - currentUsername
            - currentPassword
            - newPassword
            - confirmNewPassword
          properties:
            currentUsername:
              type: string
              description: The current username
            currentPassword:
              type: string
              description: The current password
            newUsername:
              type: string
              description: The new username (optional, defaults to currentUsername)
            newPassword:
              type: string
              description: The new password
            confirmNewPassword:
              type: string
              description: Confirmation of the new password
        example:
          currentUsername: "admin"
          currentPassword: "oldpassword"
          newUsername: "admin"
          newPassword: "newpassword"
          confirmNewPassword: "newpassword"
  responses:
    '200':
      description: The credentials were updated successfully.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: boolean
          example:
            status: true
    '400':
      $ref: "../../../components/responses/400.yml"
    '401':
      $ref: "../../../components/responses/401.yml"
    '403':
      $ref: "../../../components/responses/403.yml"